<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Grand Line Archive | One Piece Dle</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- RESTORED FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css?v=300">
</head>
<body class="main-bg bg-black min-h-screen relative overflow-x-hidden">

    <!-- VERIFIED AUDIO LINKS -->
    <audio id="sound-win" preload="auto">
        <source src="https://www.myinstants.com/media/sounds/luffy-laugh-one-piece.mp3" type="audio/mpeg">
    </audio>
    <audio id="sound-lose" preload="auto">
        <source src="https://www.myinstants.com/media/sounds/doflamingo-laugh.mp3" type="audio/mpeg">
    </audio>

    <main class="relative z-10 w-full max-w-7xl mx-auto px-4 flex flex-col items-center pt-10 pb-24">
        <div class="w-full max-w-[650px] flex flex-col gap-4">
            
            <div class="grid grid-cols-2 gap-4">
                <div class="relative flex items-center glass-panel p-1 rounded-full border h-[55px] overflow-hidden">
                    <div id="mode-indicator" class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-white/40 rounded-full transition-all duration-500"></div>
                    <button id="btn-daily" class="relative z-10 w-1/2 h-full flex items-center justify-center gap-2 mode-active">
                        <span class="material-symbols-outlined text-lg">calendar_today</span>
                        <span class="font-label-style" style="color:inherit">Daily</span>
                    </button>
                    <button id="btn-unlimited" class="relative z-10 w-1/2 h-full flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-lg">all_inclusive</span>
                        <span class="font-label-style" style="color:inherit">Unlimited</span>
                    </button>
                </div>
                <div class="glass-panel flex items-center justify-center gap-3 rounded-full border h-[55px]">
                    <span class="font-label-style" style="opacity:0.6">Guesses Left:</span>
                    <span id="guesses-left-text" class="text-xl font-bold text-black">10 / 10</span>
                </div>
            </div>

            <div id="search-module" class="relative group">
                <div class="relative flex items-center glass-panel border rounded-full overflow-hidden h-[55px]">
                    <div class="pl-6 text-black/40"><span class="material-symbols-outlined text-xl">search</span></div>
                    <input id="guess-input" class="w-full bg-transparent border-none focus:ring-0 py-4 px-4 text-lg uppercase outline-none text-black font-bold placeholder:text-black/30" placeholder="SEARCH CHARACTER..." type="text" autocomplete="off"/>
                </div>
                <div id="autocomplete-list" class="absolute top-[calc(100%+10px)] left-0 w-full rounded-2xl shadow-2xl z-50 hidden max-h-64 overflow-y-auto"></div>
            </div>
        </div>

        <section id="game-board" class="w-full mt-12 flex flex-col gap-4 items-center"></section>
    </main>

    <div id="end-overlay" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/80 backdrop-blur-sm opacity-0 transition-all duration-700">
        <div id="end-modal" class="glass-panel border-2 rounded-3xl p-10 max-w-md w-full text-center">
            <h2 id="card-title" class="text-4xl font-black mb-4 uppercase italic"></h2>
            <p id="card-subtitle" class="text-lg font-bold text-black/70 mb-8"></p>
            <button id="btn-play-again" class="w-full py-4 rounded-2xl bg-black text-white font-bold uppercase tracking-widest hover:scale-105 transition-all">Try Again</button>
        </div>
    </div>

    <script src="script.js?v=300"></script>
</body>
</html>
