<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>One Piece Dle | Tactical Terminal</title>
    
    <link rel="icon" href="data:,">
    
    <!-- Fonts: Inter (UI) and JetBrains Mono (Data) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CDN for layout structuring -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Local Stylesheet -->
    <link rel="stylesheet" href="style.css?v=999">
</head>
<body class="hide-scroll">

    <!-- Audio handled entirely in script.js -->

    <main class="relative z-10 w-full max-w-7xl mx-auto px-4 flex flex-col items-center pt-8 pb-24">
        
        <!-- HEADER INTERFACE STACK (Fixed Width for Symmetry) -->
        <div class="w-full max-w-[700px] flex flex-col gap-4">
            
            <div class="grid grid-cols-2 gap-4">
                <!-- Mode Toggle -->
                <div class="glass-ui relative flex items-center p-1 rounded-lg h-[55px] overflow-hidden border border-white/10">
                    <div id="mode-pill" class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-white/10 rounded-md transition-all duration-300 pointer-events-none"></div>
                    
                    <button id="btn-daily" class="relative z-10 w-1/2 h-full flex items-center justify-center gap-2 font-bold text-[11px] uppercase tracking-widest mode-active transition-all">
                        <span class="material-symbols-outlined text-sm">calendar_today</span> Daily
                    </button>
                    
                    <button id="btn-unlimited" class="relative z-10 w-1/2 h-full flex items-center justify-center gap-2 font-bold text-[11px] uppercase tracking-widest opacity-40 transition-all">
                        <span class="material-symbols-outlined text-sm">all_inclusive</span> Random
                    </button>
                </div>
                
                <!-- Guesses Left -->
                <div class="glass-ui flex items-center justify-center gap-3 rounded-lg h-[55px] border border-white/10">
                    <span class="text-[10px] uppercase font-bold opacity-50 tracking-widest">Signal:</span>
                    <span id="guesses-left-text" class="font-mono text-xl font-bold text-[#00f2ff]">10 / 10</span>
                </div>
            </div>

            <!-- SEARCH BAR -->
            <div id="search-module" class="relative z-50">
                <div class="glass-ui flex items-center rounded-lg px-6 h-[60px] border border-white/20 shadow-2xl">
                    <span class="material-symbols-outlined text-white/30 mr-4">search</span>
                    <input id="guess-input" class="w-full bg-transparent border-none focus:ring-0 text-white font-mono text-lg uppercase outline-none placeholder:text-white/20" placeholder="IDENTIFY CHARACTER..." type="text" autocomplete="off"/>
                </div>
                <!-- Dropdown -->
                <div id="autocomplete-list" class="absolute top-[calc(100%+8px)] left-0 w-full glass-dropdown rounded-lg shadow-2xl z-[999] hidden max-h-[300px] overflow-y-auto hide-scroll"></div>
            </div>
        </div>

        <!-- GAME BOARD -->
        <div class="w-full mt-12 overflow-x-auto hide-scroll pb-8">
            <div id="game-board" class="min-w-[1150px] flex flex-col gap-3 items-center">
                <!-- Column Headers -->
                <div class="w-full grid grid-cols-11 gap-2 mb-2 px-2 font-mono text-[10px] uppercase opacity-40 tracking-widest text-center font-bold">
                    <div>Unit</div><div>Sex</div><div>Race</div><div>Role</div><div>Group</div><div>Fruit</div><div>Haki</div><div>Height</div><div>Value</div><div>Origin</div><div>Debut</div>
                </div>
                <!-- Rows Injected Here -->
            </div>
        </div>
    </main>

    <!-- END MODAL -->
    <div id="end-overlay" class="fixed inset-0 z-[1000] hidden items-center justify-center bg-black/90 backdrop-blur-md opacity-0 transition-all duration-500">
        <div class="glass-ui border-2 border-[#00f2ff]/30 rounded-xl p-8 max-w-2xl w-full text-center shadow-[0_0_50px_rgba(0,242,255,0.15)] transform scale-95 transition-all duration-500" id="end-modal">
            
            <h2 id="card-title" class="font-mono text-3xl font-bold mb-4 tracking-tighter uppercase"></h2>
            
            <!-- Profile Image -->
            <img id="modal-img" src="" class="w-[120px] h-[120px] mx-auto rounded-lg object-cover border-2 border-white/20 shadow-xl mb-6 hidden">
            
            <!-- Profile Stats Grid -->
            <div id="modal-profile" class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-8"></div>

            <button id="btn-play-again" class="px-12 py-4 rounded-lg bg-[#00f2ff] text-black font-bold uppercase tracking-widest hover:bg-white hover:scale-105 active:scale-95 transition-all">Re-Initialize</button>
        </div>
    </div>

    <script src="script.js?v=999"></script>
</body>
</html>
