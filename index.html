<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>One Piece Dle | Tactical Navigation</title>
    
    <link rel="icon" href="data:,">
    <!-- Fonts required by your index.css -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Using the filename you provided -->
    <link rel="stylesheet" href="index.css">
    <!-- Tailwind for layout utilities -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="hide-scroll">

    <main class="relative z-10 w-full max-w-7xl mx-auto px-4 flex flex-col items-center pt-10 pb-24">
        
        <!-- HEADER INTERFACE STACK -->
        <div class="w-full max-w-[700px] flex flex-col gap-4">
            
            <div class="grid grid-cols-2 gap-4">
                <!-- Mode Selection -->
                <div class="glass-ui relative flex items-center p-1 rounded-lg h-[55px] overflow-hidden">
                    <button id="btn-daily" class="relative z-10 w-1/2 h-full flex items-center justify-center gap-2 transition-all font-bold text-xs uppercase tracking-widest active-mode">
                        <span class="material-symbols-outlined text-sm">calendar_today</span> Daily
                    </button>
                    <button id="btn-unlimited" class="relative z-10 w-1/2 h-full flex items-center justify-center gap-2 transition-all font-bold text-xs uppercase tracking-widest opacity-40">
                        <span class="material-symbols-outlined text-sm">all_inclusive</span> Random
                    </button>
                </div>
                
                <!-- Guesses Left -->
                <div class="glass-ui flex items-center justify-center gap-3 rounded-lg h-[55px]">
                    <span class="text-[10px] uppercase font-bold opacity-50">Signal Strength:</span>
                    <span id="guesses-left-text" class="font-mono text-lg font-bold text-neon-cyan">10 / 10</span>
                </div>
            </div>

            <!-- SEARCH BAR -->
            <div id="search-module" class="relative">
                <div class="glass-ui flex items-center rounded-lg px-6 h-[60px] border border-white/20">
                    <span class="material-symbols-outlined text-white/30 mr-4">search</span>
                    <input id="guess-input" class="w-full bg-transparent border-none focus:ring-0 text-white font-mono text-lg uppercase outline-none placeholder:text-white/10" placeholder="IDENTIFY CHARACTER..." type="text" autocomplete="off"/>
                </div>
                <div id="autocomplete-list" class="absolute top-[calc(100%+10px)] left-0 w-full glass-dropdown rounded-lg z-50 hidden max-h-80 overflow-y-auto hide-scroll"></div>
            </div>
        </div>

        <!-- GAME BOARD -->
        <div class="w-full mt-12 overflow-x-auto hide-scroll">
            <div id="game-board" class="min-w-[1100px] flex flex-col gap-3">
                <!-- Header labels are generated by JS -->
            </div>
        </div>
    </main>

    <!-- END MODAL -->
    <div id="end-overlay" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/90 backdrop-blur-md opacity-0 transition-all duration-500">
        <div class="glass-ui border-2 border-neon-cyan/30 rounded-xl p-10 max-w-2xl w-full text-center shadow-[0_0_50px_rgba(0,242,255,0.1)]" id="end-modal">
            <h2 id="card-title" class="font-mono text-3xl font-bold mb-6 tracking-tighter uppercase"></h2>
            
            <div id="modal-profile" class="grid grid-cols-2 md:grid-cols-5 gap-2 my-6">
                <!-- Profile stats injected by JS -->
            </div>

            <button id="btn-play-again" class="mt-4 px-12 py-4 rounded-lg bg-neon-cyan text-black font-bold uppercase tracking-widest hover:bg-white transition-all">Re-Initialize</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
