<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>One Piece Dle | Tactical Terminal</title>
    <link rel="icon" href="data:,">

    <!-- 1. Fonts required by your index.css -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- 2. Tailwind CDN (Used only for spacing/layout) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 3. Your specific CSS -->
    <link rel="stylesheet" href="index.css">
</head>
<body class="hide-scroll">

    <main class="relative z-10 w-full max-w-7xl mx-auto px-4 flex flex-col items-center pt-10 pb-24">
        
        <!-- HEADER UI -->
        <div class="w-full max-w-[700px] flex flex-col gap-4">
            
            <div class="grid grid-cols-2 gap-4">
                <!-- Mode Bar -->
                <div class="glass-ui relative flex items-center p-1 rounded-lg h-[55px]">
                    <div id="mode-pill" class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-white/10 rounded-md transition-all duration-300"></div>
                    <button id="btn-daily" class="relative z-10 w-1/2 h-full flex items-center justify-center gap-2 font-bold text-[10px] uppercase tracking-widest text-[#00f2ff]">
                        <span class="material-symbols-outlined text-sm">calendar_today</span> Daily
                    </button>
                    <button id="btn-unlimited" class="relative z-10 w-1/2 h-full flex items-center justify-center gap-2 font-bold text-[10px] uppercase tracking-widest opacity-40">
                        <span class="material-symbols-outlined text-sm">all_inclusive</span> Random
                    </button>
                </div>
                
                <!-- Guesses Bar -->
                <div class="glass-ui flex items-center justify-center gap-3 rounded-lg h-[55px]">
                    <span class="text-[10px] uppercase font-bold opacity-50">Signal:</span>
                    <span id="guesses-left-text" class="font-mono text-lg font-bold text-[#00f2ff]">10 / 10</span>
                </div>
            </div>

            <!-- SEARCH BAR -->
            <div id="search-module" class="relative">
                <div class="glass-ui flex items-center rounded-lg px-6 h-[60px] border border-white/10">
                    <span class="material-symbols-outlined text-white/20 mr-4">search</span>
                    <input id="guess-input" class="w-full bg-transparent border-none focus:ring-0 text-white font-mono text-lg uppercase outline-none placeholder:text-white/5" placeholder="IDENTIFY UNIT..." type="text" autocomplete="off"/>
                </div>
                <div id="autocomplete-list" class="absolute top-[calc(100%+10px)] left-0 w-full glass-dropdown rounded-lg z-50 hidden max-h-80 overflow-y-auto hide-scroll"></div>
            </div>
        </div>

        <!-- GAME BOARD -->
        <div class="w-full mt-12 overflow-x-auto hide-scroll">
            <div id="game-board" class="min-w-[1150px] flex flex-col gap-3 items-center">
                <!-- Header Labels -->
                <div class="w-full grid grid-cols-11 gap-2 mb-2 px-2 font-mono text-[9px] uppercase opacity-30 tracking-widest text-center">
                    <div>Unit</div><div>Sex</div><div>Race</div><div>Role</div><div>Group</div><div>Fruit</div><div>Haki</div><div>Height</div><div>Value</div><div>Origin</div><div>Debut</div>
                </div>
                <!-- Rows will be prepended here -->
            </div>
        </div>
    </main>

    <!-- END MODAL -->
    <div id="end-overlay" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/90 backdrop-blur-md opacity-0 transition-all duration-500">
        <div class="glass-ui border-2 border-[#00f2ff]/20 rounded-xl p-8 max-w-2xl w-full text-center" id="end-modal">
            <h2 id="end-title" class="font-mono text-2xl font-bold mb-4 uppercase tracking-tighter"></h2>
            
            <div id="modal-profile" class="grid grid-cols-2 md:grid-cols-5 gap-2 my-6"></div>

            <button id="btn-replay" class="px-10 py-3 rounded-lg bg-[#00f2ff] text-black font-bold uppercase text-xs tracking-widest hover:bg-white transition-all">Re-Initialize</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
