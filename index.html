<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>One Piece Dle | Grand Line Archive</title>
    
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <link rel="stylesheet" href="style.css?v=200">
</head>
<body>
    <!-- Background Layer -->
    <div id="bg-layer"></div>

    <!-- Audio Assets -->
    <audio id="sfx-win" src="https://raw.githubusercontent.com/ArshAnson/One-Piece-Dle-Assets/main/luffy-laugh.mp3" preload="auto"></audio>
    <audio id="sfx-lose" src="https://raw.githubusercontent.com/ArshAnson/One-Piece-Dle-Assets/main/doffy-laugh.mp3" preload="auto"></audio>

    <main class="relative z-10 w-full max-w-7xl mx-auto px-4 flex flex-col items-center pt-8 pb-24">
        
        <!-- HEADER UI: Fixed 650px Width -->
        <div class="w-full max-w-[650px] flex flex-col gap-4">
            
            <!-- Row 1: Toggles & Stats -->
            <div class="grid grid-cols-2 gap-4 h-[56px]">
                
                <!-- Mode Toggle -->
                <div class="glass-ui relative flex items-center p-1 rounded-full">
                    <div id="mode-pill" class="absolute top-1 bottom-1 w-[calc(50%-4px)] bg-white/40 rounded-full transition-all duration-300"></div>
                    
                    <button id="btn-daily" class="relative z-10 flex-1 h-full flex items-center justify-center gap-2 mode-text active">
                        <span class="material-symbols-outlined text-lg">calendar_today</span>
                        <span class="tracking-widest uppercase font-bold text-[11px]">Daily</span>
                    </button>
                    
                    <button id="btn-unlimited" class="relative z-10 flex-1 h-full flex items-center justify-center gap-2 mode-text">
                        <span class="material-symbols-outlined text-lg">all_inclusive</span>
                        <span class="tracking-widest uppercase font-bold text-[11px]">Unlimited</span>
                    </button>
                </div>
                
                <!-- Guesses Left -->
                <div class="glass-ui flex items-center justify-center gap-3 rounded-full">
                    <span class="text-[11px] uppercase font-bold text-black/60">Guesses:</span>
                    <span id="guess-counter" class="text-xl font-bold text-black tracking-widest">10</span>
                </div>
            </div>

            <!-- Row 2: Search Bar -->
            <div class="relative w-full z-50">
                <div class="glass-ui flex items-center rounded-full h-[60px] px-6 shadow-2xl">
                    <span class="material-symbols-outlined text-2xl text-black/50 mr-3">search</span>
                    <input id="search-input" class="w-full bg-transparent border-none focus:ring-0 text-black text-lg uppercase font-bold placeholder:text-black/30" placeholder="SEARCH CHARACTER..." type="text" autocomplete="off"/>
                </div>
                
                <!-- Autocomplete Dropdown -->
                <div id="dropdown" class="absolute top-[calc(100%+12px)] left-0 w-full glass-dropdown rounded-2xl shadow-2xl hidden max-h-[300px] overflow-y-auto"></div>
            </div>
        </div>

        <!-- GAME BOARD: Wrapped for horizontal scrolling on small screens -->
        <div class="w-full mt-10 overflow-x-auto pb-8 hide-scroll">
            <div id="game-board" class="min-w-[1000px] flex flex-col gap-3 items-center">
                <!-- Column Headers -->
                <div class="w-full grid grid-cols-11 gap-2 mb-2 px-2 text-center text-white/50 text-[10px] font-bold uppercase tracking-wider">
                    <div>Character</div><div>Gender</div><div>Species</div><div>Calling</div>
                    <div>Affiliation</div><div>Fruit</div><div>Haki</div><div>Height</div>
                    <div>Bounty</div><div>Origin</div><div>Debut</div>
                </div>
                <!-- Rows injected here -->
            </div>
        </div>
    </main>

    <!-- END GAME OVERLAY -->
    <div id="end-overlay" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/80 backdrop-blur-md opacity-0 transition-opacity duration-500">
        <div class="glass-ui border-2 rounded-3xl p-10 max-w-md w-full text-center shadow-2xl transform scale-95 transition-transform duration-500" id="end-modal">
            <h2 id="end-title" class="text-4xl font-black mb-2 uppercase italic text-black"></h2>
            <p id="end-subtitle" class="text-lg font-bold text-black/70 mb-8"></p>
            <button id="btn-replay" class="w-full py-4 rounded-xl bg-black text-white font-bold tracking-widest uppercase hover:scale-105 active:scale-95 transition-all shadow-xl">Play Again</button>
        </div>
    </div>

    <script src="script.js?v=200"></script>
</body>
</html>
