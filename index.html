<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Grand Line Archive | Tactical Navigation</title>
    
    <!-- Stop Favicon 404 Error -->
    <link rel="icon" href="data:,">

    <!-- External Scripts & Fonts -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=Epilogue:wght@700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- CSS with Version Query to bypass old browser cache -->
    <link rel="stylesheet" href="style.css?v=5">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-fixed": "#f7e600",
                        "background": "#0c0e11"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Manrope"],
                        "label": ["Space Grotesk"]
                    }
                }
            }
        }
    </script>
</head>
<!-- Added bg-black as a safety fallback for the background image -->
<body class="main-bg bg-black text-white font-body selection:bg-secondary-fixed selection:text-black min-h-screen relative overflow-x-hidden">

    <!-- Audio SFX (Direct GitHub Links) -->
    <audio id="sfx-wrong" src="https://raw.githubusercontent.com/ArshAnson/One-Piece-Dle-Assets/main/doffy-laugh.mp3" preload="auto"></audio>
    <audio id="sfx-win" src="https://raw.githubusercontent.com/ArshAnson/One-Piece-Dle-Assets/main/luffy-laugh.mp3" preload="auto"></audio>

    <!-- Tactical Overlay Grid -->
    <div class="fixed inset-0 pointer-events-none z-[5] opacity-[0.05] overflow-hidden">
        <div class="absolute inset-0" style="background-image: radial-gradient(circle, #ffffff 0.5px, transparent 0.5px); background-size: 30px 30px;"></div>
    </div>

    <!-- Main Content Canvas -->
    <main class="relative z-10 w-full max-w-7xl mx-auto px-4 flex flex-col items-center pt-12 pb-24">
        
        <!-- Central Interaction Cluster -->
        <div class="w-full max-w-5xl flex flex-col items-center gap-8 mb-12">
            
            <!-- Top Controls Row (FROSTED GLASS) -->
            <div class="flex flex-wrap items-center justify-center gap-4">
                
                <!-- Mode Selection -->
                <div class="flex items-center gap-6 glass-panel py-3 px-6 rounded-full border shadow-xl">
                    <button id="btn-daily" class="flex items-center gap-2 transition-colors group">
                        <span class="material-symbols-outlined text-lg">calendar_today</span>
                        <span class="font-label text-[10px] tracking-[0.2em] uppercase font-bold">Daily</span>
                    </button>
                    <div class="w-px h-4 bg-black/20"></div>
                    <button id="btn-unlimited" class="flex items-center gap-2 transition-colors group">
                        <span class="material-symbols-outlined text-lg">all_inclusive</span>
                        <span class="font-label text-[10px] tracking-[0.2em] uppercase font-bold">Unlimited</span>
                    </button>
                </div>
                
                <!-- Guesses Remaining -->
                <div class="glass-panel py-3 px-6 rounded-full border shadow-xl flex items-center gap-3">
                    <span class="text-[10px] font-label tracking-[0.2em] uppercase font-bold opacity-60">Guesses Left:</span>
                    <span id="guesses-left-text" class="font-headline text-sm font-bold">10 / 10</span>
                </div>
            </div>

            <!-- Search Tactical Module (SHRUNK TO 450px) -->
            <div id="search-module" class="w-full max-w-[450px] relative group">
                <div class="relative flex items-center glass-panel border rounded-full overflow-hidden shadow-2xl z-40">
                    <div class="pl-6 opacity-60">
                        <span class="material-symbols-outlined text-xl">search</span>
                    </div>
                    <!-- Typing text and placeholder will be BLACK as per CSS -->
                    <input id="guess-input" 
                           class="w-full bg-transparent border-none focus:ring-0 py-4 px-4 font-headline text-lg tracking-[0.1em] uppercase outline-none" 
                           placeholder="SEARCH CHARACTER..." 
                           type="text" 
                           autocomplete="off"/>
                </div>
                
                <!-- Autocomplete List (LIGHT GLASS + BLACK TEXT) -->
                <div id="autocomplete-list" class="absolute top-[calc(100%+10px)] left-0 w-full rounded-2xl shadow-2xl z-50 hidden max-h-64 overflow-y-auto">
                </div>
            </div>
        </div>

        <!-- Game Board (Latest guesses pushed to top) -->
        <section id="game-board" class="w-full flex flex-col gap-4 items-center"></section>

    </main>

    <!-- Post-Game Tactical Overlay -->
    <div id="end-overlay" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/80 backdrop-blur-sm opacity-0 transition-all duration-700">
        <div id="end-modal" class="glass-panel border-2 rounded-3xl p-12 max-w-md w-full text-center transform scale-90 transition-all duration-500">
            
            <h2 id="card-title" class="font-headline text-4xl font-black mb-4 tracking-tighter uppercase italic"></h2>
            
            <p id="card-subtitle" class="font-body text-lg font-medium text-black/70 mb-10 leading-relaxed"></p>
            
            <button id="btn-play-again" class="w-full py-5 rounded-2xl bg-black text-white font-label font-black tracking-[0.3em] uppercase hover:scale-105 transition-all active:scale-95 shadow-xl">
                Try Again
            </button>
            
        </div>
    </div>

    <!-- Script Entry -->
    <script src="script.js?v=5"></script>
</body>
</html>
