<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>One Piece Dle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-layer"></div>
    <main class="relative z-10 w-full max-w-7xl mx-auto px-4 pt-8">
        <div class="max-w-[800px] mx-auto flex flex-col gap-4">
            <!-- Nav -->
            <div class="glass-ui flex items-center justify-between p-2 rounded-full px-6">
                <div class="flex gap-4">
                    <button id="btn-daily" class="bebas text-xl active">Daily</button>
                    <button id="btn-unlimited" class="bebas text-xl">Unlimited</button>
                </div>
                <div class="text-3xl font-bold text-yellow-400 bebas" id="guess-counter">10</div>
            </div>
            <!-- Search -->
            <div class="relative">
                <div class="glass-ui flex items-center rounded-2xl h-[60px] px-6">
                    <input id="search-input" class="w-full bg-transparent border-none text-white font-bold uppercase" placeholder="Search a Pirate or Marine..."/>
                </div>
                <div id="dropdown" class="hidden"></div>
            </div>
        </div>

        <div class="w-full mt-10 overflow-x-auto hide-scroll pb-10">
            <div id="game-board" class="min-w-[1100px] flex flex-col gap-2">
                <!-- Header inserted by JS -->
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="end-overlay" class="fixed inset-0 z-[100] hidden items-center justify-center">
        <div class="modal-box text-center">
            <h2 id="end-title" class="bebas text-5xl"></h2>
            <p id="end-subtitle" class="mb-6"></p>
            <button id="btn-replay">Set Sail Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
