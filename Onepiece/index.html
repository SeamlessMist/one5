<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>One Piece Dle | Grand Line Archives</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-layer"></div>
    <main class="relative z-10 w-full max-w-7xl mx-auto px-4 pt-8">
        <div class="max-w-[800px] mx-auto flex flex-col gap-4">
            <!-- Nav Bar (Same as MHA) -->
            <div class="glass-ui flex items-center justify-between p-2 rounded-full h-[68px] px-5 shadow-2xl">
                <div class="flex items-center gap-2">
                    <a href="../index.html" class="nav-btn-glass"><span class="material-symbols-outlined" style="font-size:18px;">home</span></a>
                    <button id="btn-arclist"><span class="material-symbols-outlined" style="font-size:18px;">format_list_numbered</span></button>
                </div>
                <div class="relative flex items-center bg-black/20 rounded-full h-[44px] w-[200px] p-1 mode-switcher">
                    <div id="mode-pill" class="absolute top-1 bottom-1 w-[calc(50%-4px)] bg-white/10 rounded-full transition-all duration-300 left-1"></div>
                    <button id="btn-daily" class="mode-btn active">Daily</button>
                    <button id="btn-unlimited" class="mode-btn">Unlimited</button>
                </div>
                <div id="guess-counter" class="text-2xl font-bold text-yellow-400 bebas">10</div>
            </div>
            <!-- Search -->
            <div class="relative w-full z-50">
                <div class="glass-ui flex items-center rounded-2xl h-[60px] px-6">
                    <span class="material-symbols-outlined text-white/30 mr-4">search</span>
                    <input id="search-input" class="w-full bg-transparent border-none text-white text-base font-bold uppercase placeholder:text-white/20" placeholder="Search a Character..."/>
                </div>
                <div id="dropdown" class="hidden"></div>
            </div>
        </div>

        <div class="w-full mt-10 overflow-x-auto hide-scroll pb-10">
            <div id="game-board" class="min-w-[1200px] flex flex-col gap-3 items-center">
                <!-- Grid items generated by script -->
            </div>
        </div>
    </main>

    <!-- Modals -->
    <div id="end-overlay" class="fixed inset-0 z-[100] hidden items-center justify-center">
        <div class="modal-box text-center">
            <h2 id="end-title" class="bebas text-5xl"></h2>
            <p id="end-subtitle" class="uppercase font-bold text-xs text-white/50 mb-6"></p>
            <div id="modal-profile"></div>
            <button id="btn-replay">Set Sail Again</button>
        </div>
    </div>

    <div id="arc-overlay">
        <div class="arc-modal">
            <h2 class="bebas text-3xl mb-4 text-yellow-400">Grand Line Arcs</h2>
            <div class="arc-list" id="arc-list-content"></div>
            <button class="w-full p-3 mt-6 rounded-xl bg-white/10 uppercase font-black text-xs" id="btn-arc-close">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
